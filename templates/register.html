<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            min-height:100vh;
            background: linear-gradient(135deg,#4facfe,#00f2fe);
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
        }

        .card-register{
            width:500px;
            border:none;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,.2);
        }

        .title{
            text-align:center;
            font-size:32px;
            font-weight:bold;
            color:#0d6efd;
        }
    </style>
</head>
<body>

<div class="card card-register p-4">

    <div class="title mb-4">
        Đăng Ký Tài Khoản
    </div>

 <form method="POST" action="/register">

    <div class="mb-3">
        <label>Tên đăng nhập</label>
        <input
            name="username"
            type="text"
            class="form-control"
            placeholder="username"
            required>
    </div>

    <div class="mb-3">
        <label>Email</label>
        <input
            name="email"
            type="email"
            class="form-control"
            placeholder="example@gmail.com"
            required>
    </div>

    <div class="mb-3">
        <label>Mật khẩu</label>
        <input
            name="password"
            type="password"
            class="form-control"
            placeholder="********"
            required>
    </div>
    {% if error %}
    <div class="text-danger mb-3">
        {{ error }}
    </div>
    {% endif %}
    <button type="submit" class="btn btn-success w-100">
        Đăng ký
    </button>

    <div class="text-center mt-3">
        Đã có tài khoản?
        <a href="/login">
            Đăng nhập
        </a>
    </div>

</form>

</div>

</body>
</html>
