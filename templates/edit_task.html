<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Task</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#0f172a;
            color:white;
            min-height:100vh;
        }

        /* NAVBAR */

        .navbar-custom{
            background:#111827;
            border-bottom:1px solid #374151;
            padding:18px 30px;
        }

        .logo{
            color:#38bdf8;
            text-decoration:none;
            font-size:28px;
            font-weight:bold;
        }

        .menu-btn{
            margin-left:10px;
            border:none;
            border-radius:10px;
            padding:8px 16px;
            font-weight:600;
        }

        .btn-group-new{
            background:#22c55e;
            color:white;
        }

        .btn-mytask{
            background:#f59e0b;
            color:white;
        }

        .btn-logout{
            background:#ef4444;
            color:white;
            text-decoration:none;
        }

        .form-control{
            background:#1e293b;
            border:1px solid #475569;
            color:white;
        }

        .form-control:focus{
            background:#1e293b;
            color:white;
            border-color:#38bdf8;
            box-shadow:none;
        }

        .form-select{
            background:#1e293b;
            border:1px solid #475569;
            color:white;
        }

        .form-select:focus{
            background:#1e293b;
            color:white;
            border-color:#38bdf8;
            box-shadow:none;
        }

        /* CONTENT */

        .container-custom{
            max-width:900px;
            margin:auto;
            padding:40px 20px;
        }

        .card-form{
            background:#1e293b;
            border-radius:20px;
            padding:30px;
            box-shadow:0 5px 20px rgba(0,0,0,.3);
        }

        .page-title{
            color:#38bdf8;
            font-size:32px;
            font-weight:bold;
            margin-bottom:30px;
        }

        label{
            margin-bottom:8px;
            font-weight:600;
        }

        .member-box{
            background:#0f172a;
            border:1px solid #334155;
            border-radius:10px;
            padding:15px;
        }

        .member-item{
            margin-bottom:10px;
        }

        .btn-update{
            background:#2563eb;
            color:white;
            border:none;
            padding:12px 25px;
            border-radius:10px;
            font-weight:bold;
        }

        .btn-update:hover{
            background:#1d4ed8;
        }

        textarea{
            resize:none;
        }

    </style>

</head>

<body>

<nav class="navbar navbar-custom d-flex justify-content-between">

    <a href="index.html" class="logo">
        ToDoListTogether
    </a>

    <div>

        <a href="#" class="menu-btn btn-group-new text-decoration-none">
            + New Group
        </a>

        <a href="mytask.html" class="menu-btn btn-mytask text-decoration-none">
            📋 My Task
        </a>

        <a href="#" class="menu-btn btn-logout">
            Logout
        </a>

    </div>

</nav>

<div class="container-custom">

    <div class="page-title">
        ✏️ Edit Task
    </div>

    <div class="card-form">

        <form>

            <!-- TASK NAME -->

            <div class="mb-4">

                <label>Task Name</label>

                <input
                    type="text"
                    name="taskName"
                    class="form-control"
                    value="Build Login API">

            </div>

            <!-- DESCRIPTION -->

            <div class="mb-4">

                <label>Description</label>

                <textarea
                    name="description"
                    class="form-control"
                    rows="4">Xây dựng API đăng nhập bằng Flask và MySQL</textarea>

            </div>

            <!-- START DATE & DEADLINE -->

            <div class="row">

                <div class="col-md-6 mb-4">

                    <label>Start Date</label>

                    <input
                        type="date"
                        name="startDate"
                        class="form-control"
                        value="2026-06-01">

                </div>

                <div class="col-md-6 mb-4">

                    <label>Deadline</label>

                    <input
                        type="date"
                        name="deadline"
                        class="form-control"
                        value="2026-06-08">

                </div>

            </div>

            <!-- LEVEL -->

            <div class="mb-4">

                <label>Level</label>

                <select
                    name="level"
                    class="form-select">

                    <option value="High" selected>
                        High
                    </option>

                    <option value="Medium">
                        Medium
                    </option>

                    <option value="Low">
                        Low
                    </option>

                </select>

            </div>

            <!-- ASSIGN TO -->

            <div class="mb-4">

                <label>Assign To</label>

                <div class="member-box">

                    <div class="member-item">
                        <input
                            type="checkbox"
                            name="allMembers">

                        ALL MEMBERS
                    </div>

                    <hr>

                    <div class="member-item">

                        <input
                            type="checkbox"
                            name="assignee"
                            value="1"
                            checked>

                        Duy

                    </div>

                    <div class="member-item">

                        <input
                            type="checkbox"
                            name="assignee"
                            value="2">

                        Nam

                    </div>

                    <div class="member-item">

                        <input
                            type="checkbox"
                            name="assignee"
                            value="3"
                            checked>

                        Minh

                    </div>

                    <div class="member-item">

                        <input
                            type="checkbox"
                            name="assignee"
                            value="4">

                        Long

                    </div>

                </div>

            </div>

            <!-- BUTTON -->

            <button type="submit" class="btn-update">
                Update Task
            </button>

        </form>

    </div>

</div>

</body>
</html>
