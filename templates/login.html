<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            height:100vh;
            background: linear-gradient(135deg,#667eea,#764ba2);
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .card-login{
            width:400px;
            border:none;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,.2);
        }

        .logo{
            font-size:32px;
            font-weight:bold;
            text-align:center;
            color:#764ba2;
        }
    </style>
</head>
<body>

<div class="card card-login p-4">
    <div class="logo mb-4">
        Task Manager
    </div>

<form method="POST" action="/login">

    <div class="mb-3">
        <label>Email</label>
        <input
            name="email"
            type="email"
            class="form-control"
            placeholder="Nhập email"
            required>
    </div>

    <div class="mb-3">
        <label>Mật khẩu</label>
        <input
            name="password"
            type="password"
            class="form-control"
            placeholder="Nhập mật khẩu"
            required>
    </div>

    <button type="submit" class="btn btn-primary w-100">
        Đăng nhập
    </button>

    <div class="text-center mt-3">
        Chưa có tài khoản?
        <a href="/register">
            Đăng ký
        </a>
    </div>

</form>
</div>

</body>
</html>
